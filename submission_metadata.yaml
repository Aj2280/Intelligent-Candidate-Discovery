ai_usage_summary: |
AI-assisted development was used throughout the project lifecycle.

* ChatGPT was used for code review, debugging, architecture discussions,
  UI/UX improvements, documentation drafting, and testing support.

* Gemini was used for technical documentation, README improvements,
  architecture validation, and debugging assistance.

* Antigravity was used as an AI coding assistant to accelerate implementation,
  generate boilerplate code, refactor modules, and improve development productivity.

All ranking logic, scoring methodology, candidate filtering, evaluation,
and final submission outputs execute locally without external API calls during ranking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  We implemented a two-stage hybrid ranking architecture that combines semantic
  retrieval with structured feature scoring. Candidate relevance is computed using
  SentenceTransformer embeddings (45%) and domain-specific feature engineering (55%)
  including title alignment, skill quality, experience fit, education, and location.
  Behavioral signals such as recruiter engagement, response rate, notice period,
  and profile activity are incorporated through a multiplier layer. Adversarial
  profiles are filtered using a honeypot detection module. The final ranking
  pipeline is fully CPU-compatible, deterministic, and optimized for large-scale
  candidate discovery under hackathon constraints.

